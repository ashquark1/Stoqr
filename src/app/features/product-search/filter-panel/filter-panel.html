<div class="filter-panel">
  <stoqr-filter-select
    label="Stock Status"
    [options]="statusOptions()"
    [selected]="statusSelected()"
    (selectedChange)="onStatus($event)"
  />

  <stoqr-filter-select
    label="Category"
    [options]="categoryOptions()"
    [selected]="categorySelected()"
    (selectedChange)="onCategory($event)"
  />

  <stoqr-filter-select
    label="Sub-category"
    [options]="subCategoryOptions()"
    [selected]="subCategorySelected()"
    (selectedChange)="onSubCategory($event)"
  />

  <button
    type="button"
    class="stoqr-btn stoqr-btn--ghost filter-panel__reset"
    (click)="reset()"
  >
    Reset Filters
  </button>
</div>
