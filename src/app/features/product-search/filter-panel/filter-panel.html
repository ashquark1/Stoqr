<div class="filter-panel">
  <stoqr-filter-select
    label="Stock Status"
    [options]="statusOptions()"
    [selected]="statusSelected()"
    (selectedChange)="onStatus($event)"
  />

  <stoqr-filter-select
    label="Category"
    [options]="categoryOptions()"
    [selected]="categorySelected()"
    (selectedChange)="onCategory($event)"
  />

  <stoqr-filter-select
    label="Sub-category"
    [options]="subCategoryOptions()"
    [selected]="subCategorySelected()"
    (selectedChange)="onSubCategory($event)"
  />

  <stoqr-filter-select
    label="Brand"
    [options]="brandOptions()"
    [selected]="brandSelected()"
    [showSearch]="true"
    (selectedChange)="onBrand($event)"
  />

  <hr class="filter-panel__divider" />

  <stoqr-toggle
    label="Show Inactive Products"
    [checked]="showInactive()"
    (checkedChange)="onShowInactive($event)"
  />
  <stoqr-toggle
    label="Show Discontinued Products"
    [checked]="showDiscontinued()"
    (checkedChange)="onShowDiscontinued($event)"
  />

  <hr class="filter-panel__divider" />

  <button
    type="button"
    class="stoqr-btn stoqr-btn--ghost filter-panel__reset"
    (click)="reset()"
  >
    Reset Filters
  </button>
</div>
