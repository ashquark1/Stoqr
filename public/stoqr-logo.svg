    <path fill="#1A7A4A" d="M 0 0 C -38 -38,-115 -88,-115 -170 C -115 -248,-55 -262, 0 -232 C 55 -262,115 -248,115 -170 C 115 -88,38 -38, 0 0 Z"/>
  </g>

  <!-- TOP -->
  <g transform="translate(340,265) rotate(180)">
    <path fill="#1A7A4A" d="M 0 0 C -38 -38,-115 -88,-115 -170 C -115 -248,-55 -262, 0 -232 C 55 -262,115 -248,115 -170 C 115 -88,38 -38, 0 0 Z"/>
